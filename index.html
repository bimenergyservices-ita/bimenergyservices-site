<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIM Energy Services</title>
  <meta name="description" content="Consulenza, Progettazione e Direzione Lavori." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7f6 0%, #e9efeb 100%);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 56px 48px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.6);
    }

    .logo {
      width: 180px;
      max-width: 100%;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
      color: #1d3b2a;
    }

    .subtitle {
      font-size: 1.08rem;
      line-height: 1.8;
      color: #4b5563;
      max-width: 620px;
      margin: 0 auto 40px auto;
    }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 20px;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      color: #1d3b2a;
      background: #f7faf8;
      padding: 16px 22px;
      border-radius: 16px;
      border: 1px solid #d9e4dd;
      transition: all 0.25s ease;
      font-weight: 500;
      font-size: 1rem;
    }

    .contact-link:hover {
      transform: translateY(-2px);
      background: #eef5f0;
      border-color: #b8cec0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }

    .footer {
      margin-top: 42px;
      font-size: 0.9rem;
      color: #6b7280;
    }

    @media (max-width: 640px) {
      .card {
        padding: 42px 24px;
      }

      h1 {
        font-size: 2rem;
      }

      .subtitle {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <main class="card">
    <img src="logo.png" alt="BIM Energy Services" class="logo">

    <h1>BIM Energy Services</h1>

    <p class="subtitle">
      Consulenza, Progettazione e Direzione Lavori.
    </p>

    <section class="contacts">
      <a class="contact-link" href="tel:+390668584303">
        📞 06 68584303
      </a>

      <a class="contact-link" href="mailto:info@bimenergyservices.it">
        ✉️ info@bimenergyservices.it
      </a>

      <div class="contact-link">
        📍 Trevignano Romano
      </div>
    </section>

    <div class="footer">
      © BIM Energy Services
    </div>
  </main>

</body>
</html>
